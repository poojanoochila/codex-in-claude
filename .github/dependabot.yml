version: 2
updates:
  # Python dependencies managed by uv (reads pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      python-dev:
        dependency-type: "development"

  # GitHub Actions used in workflows (keeps SHA pins current).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
