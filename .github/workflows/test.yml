name: Test

on:
  workflow_call:

# Least-privilege: the gate only reads the repo. Keep OIDC/environment OUT of here.
permissions:
  contents: read

jobs:
  gate:
    name: lint + types + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Check GitHub Actions are SHA-pinned
        run: uv run python scripts/check_github_actions_pinning.py
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run ty check
      - name: Test (95% coverage floor)
        run: uv run pytest
